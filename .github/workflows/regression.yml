name: Regression Tests
run-name: ${{ github.actor }} triggered Regression Tests on ${{ github.event.inputs.environment || 'staging' }}

on:
  schedule:
    - cron: '0 0 * * *'

  workflow_dispatch:
    inputs:
      environment:
        description: Select the Test Environment
        required: true
        default: 'staging'
        type: choice
        options:
          - local
          - staging
      video_record:
        description: Enable Video Recording
        required: true
        default: false
        type: boolean
      generate_allure:
        description: Generate Allure Report
        required: true
        default: true
        type: boolean

env:
  CI: true
  TEST_ENV: ${{ github.event.inputs.environment || 'staging' }}
  VIDEO: ${{ github.event.inputs.video_record || false }}
  LOCAL_USER_EMAIL: ${{ secrets.LOCAL_USER_EMAIL }}
  LOCAL_USER_PASSWORD: ${{ secrets.LOCAL_USER_PASSWORD }}
  STAGING_USER_EMAIL: ${{ secrets.STAGING_USER_EMAIL }}
  STAGING_USER_PASSWORD: ${{ secrets.STAGING_USER_PASSWORD }}
  STAGING_USER_PAT: ${{ secrets.STAGING_USER_PAT }}
  STAGING_USER_READONLY_PAT: ${{ secrets.STAGING_USER_READONLY_PAT }}
  XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
  XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}
  XRAY_PROJECT_KEY: ${{ secrets.XRAY_PROJECT_KEY }}
  AUTO_SYNC: ${{ secrets.AUTO_SYNC || 'true' }}

jobs:
  IntegrationTests:
    name: Integration ${{ matrix.module }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: atc
            testPath: tests/integration/atc/
            prefix: atc
          - module: auth
            testPath: tests/integration/auth/
            prefix: auth
          - module: defects
            testPath: tests/integration/defects/
            prefix: defects
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Validate Test Environment Variables
        run: bun run test:env:check

      - name: Install Playwright (API context)
        run: bun run pw:install

      - name: Run Sandbox Tests
        run: bunx playwright test --project=sandbox

      - name: Run ${{ matrix.module }} Integration Tests
        run: bunx playwright test --project=integration ${{ matrix.testPath }}

      - name: Upload ${{ matrix.prefix }} Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.prefix }}-allure-results
          path: allure-results/
          retention-days: 10

      - name: Upload ${{ matrix.prefix }} Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.prefix }}-test-results
          path: test-results/
          retention-days: 10

      - name: Cleanup Workspace
        if: always()
        run: |
          rm -rf node_modules
          rm -rf allure-results
          rm -rf test-results

  E2ETests:
    name: E2E Tests
    needs: IntegrationTests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Validate Test Environment Variables
        run: bun run test:env:check

      - name: Install Playwright Browsers
        run: bun run pw:install

      - name: Run E2E Tests on ${{ env.TEST_ENV }}
        run: bun run test:e2e

      - name: Upload E2E Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-allure-results
          path: allure-results/
          retention-days: 10

      - name: Upload E2E Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 10

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-playwright-report
          path: playwright-report/
          retention-days: 10

      - name: Upload Failure Evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-evidence
          path: |
            test-results/
            playwright-report/
          retention-days: 10

      - name: Cleanup Workspace
        if: always()
        run: |
          rm -rf node_modules
          rm -rf allure-results
          rm -rf test-results
          rm -rf playwright-report

  allure-report:
    name: Build & Deploy Allure Report
    needs: [IntegrationTests, E2ETests]
    runs-on: ubuntu-latest
    if: ${{ always() && github.event.inputs.generate_allure != 'false' }}

    steps:
      - name: Get Allure History
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 1
        continue-on-error: true

      - name: Download All Module Results
        uses: actions/download-artifact@v4
        with:
          pattern: '*-allure-results'
          path: regression-artifacts/
          merge-multiple: true
        continue-on-error: true

      - name: Check Allure Results
        id: check_allure
        shell: bash
        run: |
          if [ -d "regression-artifacts" ] && [ -n "$(ls -A regression-artifacts 2>/dev/null)" ]; then
            echo "has_results=true" >> $GITHUB_OUTPUT
          else
            echo "has_results=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Allure Report
        if: steps.check_allure.outputs.has_results == 'true'
        uses: simple-elf/allure-report-action@master
        with:
          gh_pages: gh-pages
          subfolder: ${{ env.TEST_ENV }}/regression
          allure_results: regression-artifacts
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 3

      - name: Deploy to GitHub Pages
        if: steps.check_allure.outputs.has_results == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history/${{ env.TEST_ENV }}/regression
          destination_dir: ${{ env.TEST_ENV }}/regression
          keep_files: true

      - name: Post Report URL
        if: steps.check_allure.outputs.has_results == 'true'
        run: |
          echo "## Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "View the report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ env.TEST_ENV }}/regression/" >> $GITHUB_STEP_SUMMARY
