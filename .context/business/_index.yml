# Business context index for Bunkai TMS — compact entry point for AI agents.
# Full detail: business-data-map.md (entities/flows/state-machines),
# business-feature-map.md (features), business-api-map.md (API/auth).
# Regenerated by: /project-discovery (greenfield). Last: 2026-05-27.

project:
  name: Bunkai TMS
  key: BK
  domain: bunkai.io
  description: >
    Open-core Test Management System built on a single rule — every ATC (Atomic Test
    Component) must be anchored to a User Story and at least one Acceptance Criterion.
    Tests are ordered chains of reusable ATCs; editing one ATC propagates to every Test.
    Three execution modes (manual, agentic, automated) share the same data model.
    Two editions from one codebase: Bunkai Cloud (Supabase-hosted) and Bunkai Community
    (self-hosted Docker Compose). Native bug management inside the test cycle, optional
    Jira sync, API-first for AI operators.

stack:
  frontend: Next.js 15 + React 19 + Tailwind
  backend: Next.js 15 + TypeScript
  database: PostgreSQL (Supabase)
  hosting: Vercel (MVP)
  auth: Supabase Auth (JWT OAuth GitHub/Google + magic-link)

entities:
  - slug: workspaces
    role: Tenant root — isolates one team/customer from another (multi-tenant SaaS).
  - slug: workspace_members
    role: RBAC anchor mapping users to workspaces with role (viewer ⊂ member ⊂ admin ⊂ owner).
  - slug: workspace_invites
    role: Pending email-based invitations with 24h signed tokens for onboarding.
  - slug: access_tokens
    role: Hashed Personal Access Tokens for headless API consumers (CLI, AI agents, CI).
  - slug: projects
    role: The app/product under test inside a workspace; owns module tree and run history.
  - slug: modules
    role: Tree-shaped product taxonomy with materialized path; defect heatmaps roll up by module.
  - slug: environments
    role: Named deployment targets a Run can hit (staging, prod); enables multi-env attribution.
  - slug: integrations
    role: Per-project config + secrets-ref for Jira, GitHub, etc.
  - slug: user_stories
    role: Business-context anchor for ATCs; optional external_id to Jira for import dedup.
  - slug: acceptance_criteria
    role: One AC = one testable behavior; every ATC links to ≥1 AC (structural traceability).
  - slug: atcs
    role: Heart of the product — atomic, reusable, US+AC-anchored test component; enables one-edit-many-tests.
  - slug: tests
    role: Named, taggable container owning an ordered chain of ATCs via test_steps; unit of execution.
  - slug: runs
    role: One execution instance of a Test against an environment; carries executor identity + progress.
  - slug: bugs
    role: Native defect anchored to module (mandatory), optional atc + run; drives defect heatmap.
  - slug: activity_log
    role: Single insert-only audit stream of all state-changing actions in the workspace.

flows:
  - name: setup-flow
    description: >
      Elena signs in via GitHub OAuth, creates Workspace → Project → Module tree,
      optionally imports User Stories + AC from Jira, then authors first ATC anchored to US/AC.
  - name: manual-run-bug-flow
    description: >
      Elena starts a Run on a Test, marks steps pass/fail/block, the transaction recomputes
      progress, and on failure files a Bug pre-filled with module/atc/run context.
  - name: agent-driven-run-flow
    description: >
      Karim (AI agent) authenticates via Bearer PAT, fetches Test contract with ?expand,
      starts an idempotent Run, posts step results, and files Bugs — same endpoints as manual mode.
  - name: tree-view-rollup-flow
    description: >
      Recursive CTE over modules joined with per-node counts of US/ATC/Test + last-run
      status dots; powers the left-side navigation tree.

state_machines:
  - entity: runs
    states: [running, passed, failed, aborted]
    note: Terminal states are absorbing; no step updates accepted on terminal Runs.
  - entity: run_atcs
    states: [pending, running, pass, fail, block, skipped]
    note: Derived status recomputed on every child run_step update; never client-written.
  - entity: run_steps
    states: [pending, pass, fail, block, skipped]
    note: Single-transition per step; parent run_atc status recomputed every write.
  - entity: bugs
    states: [open, in_progress, resolved, closed]
    note: Reopening (closed → open) is allowed and tracked for regression metrics.
  - entity: workspace_invites
    states: [pending, accepted, expired, revoked]
    note: 24h expiry enforced by signed token, not row lifecycle.
  - entity: imports
    states: [pending, running, succeeded, failed]
    note: Jira import async job; polled via /imports/{id}.

auth:
  model: >
    Two consumer classes: browser users carry JWT in HttpOnly cookie (Supabase Auth,
    GitHub/Google OAuth or magic-link), API operators carry Bearer PATs (bk_pat_<random>,
    SHA-256 hashed). RBAC role hierarchy viewer ⊂ member ⊂ admin ⊂ owner enforced via
    Postgres RLS on every table carrying workspace_id. Token scopes (read|write) are
    AND-ed with role — a member can mint a read-only PAT. No CSRF on Bearer requests.
    Idempotency-Key (24h TTL) on all write endpoints.

environments:
  local: http://localhost:3000
  staging: https://upexbunkai.vercel.app
